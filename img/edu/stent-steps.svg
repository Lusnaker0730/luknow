<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif" role="img" aria-label="心臟支架置放三步驟：血管狹窄、氣球撐開並置放支架、支架撐開血流恢復">
<defs>
<pattern id="stentmesh" width="15" height="15" patternUnits="userSpaceOnUse">
<path d="M0,7.5 L7.5,0 L15,7.5 L7.5,15 Z" fill="none" stroke="#2f6f76" stroke-width="1.5"/>
</pattern>
<marker id="flow" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
<path d="M0,0 L6,3 L0,6 Z" fill="#c43d34"/>
</marker>
</defs>

<text x="500" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#14323a">心臟支架置放（PCI）三步驟</text>
<text x="500" y="56" text-anchor="middle" font-size="13.5" fill="#7d8a8c">經心導管以氣球擴張、置放支架，撐開狹窄的冠狀動脈</text>

<!-- Panel A：血管狹窄 -->
<g transform="translate(40,0)">
<circle cx="20" cy="92" r="15" fill="#c43d34"/>
<text x="20" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
<text x="44" y="97" font-size="15.5" font-weight="700" fill="#14323a">血管狹窄</text>
<rect x="0" y="128" width="280" height="80" rx="16" fill="#f1cec7"/>
<rect x="10" y="150" width="260" height="36" rx="10" fill="#fffdf9"/>
<ellipse cx="140" cy="150" rx="88" ry="20" fill="#d7a13a"/>
<ellipse cx="140" cy="186" rx="100" ry="22" fill="#d7a13a"/>
<text x="140" y="238" text-anchor="middle" font-size="13" fill="#3c5158">斑塊讓冠狀動脈變窄，</text>
<text x="140" y="257" text-anchor="middle" font-size="13" fill="#3c5158">血流受阻</text>
</g>

<!-- Panel B：氣球撐開＋放支架 -->
<g transform="translate(360,0)">
<circle cx="20" cy="92" r="15" fill="#c43d34"/>
<text x="20" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
<text x="44" y="97" font-size="15.5" font-weight="700" fill="#14323a">氣球撐開＋放支架</text>
<rect x="0" y="128" width="280" height="80" rx="16" fill="#f1cec7"/>
<rect x="10" y="150" width="260" height="36" rx="10" fill="#fffdf9"/>
<ellipse cx="140" cy="146" rx="94" ry="11" fill="#d7a13a"/>
<ellipse cx="140" cy="190" rx="94" ry="11" fill="#d7a13a"/>
<rect x="-2" y="164" width="58" height="8" rx="4" fill="#b7bfc0" stroke="#8a9698" stroke-width="1"/>
<ellipse cx="146" cy="168" rx="96" ry="16" fill="#bfe3e6" stroke="#0f7a82" stroke-width="1.4"/>
<rect x="52" y="153" width="188" height="30" rx="15" fill="url(#stentmesh)"/>
<text x="140" y="238" text-anchor="middle" font-size="13" fill="#3c5158">氣球充氣把血管撐開，</text>
<text x="140" y="257" text-anchor="middle" font-size="13" fill="#3c5158">同時張開支架</text>
</g>

<!-- Panel C：支架撐開、血流恢復 -->
<g transform="translate(680,0)">
<circle cx="20" cy="92" r="15" fill="#c43d34"/>
<text x="20" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
<text x="44" y="97" font-size="15.5" font-weight="700" fill="#14323a">支架撐開、血流恢復</text>
<rect x="0" y="128" width="280" height="80" rx="16" fill="#f1cec7"/>
<rect x="10" y="150" width="260" height="36" rx="10" fill="#fffdf9"/>
<ellipse cx="140" cy="145" rx="96" ry="9" fill="#d7a13a"/>
<ellipse cx="140" cy="191" rx="96" ry="9" fill="#d7a13a"/>
<rect x="18" y="153" width="244" height="30" rx="15" fill="url(#stentmesh)"/>
<line x1="30" y1="168" x2="248" y2="168" stroke="#c43d34" stroke-width="6" stroke-linecap="round" marker-end="url(#flow)"/>
<text x="140" y="238" text-anchor="middle" font-size="13" fill="#3c5158">支架留下當支撐，</text>
<text x="140" y="257" text-anchor="middle" font-size="13" fill="#3c5158">血流重新暢通</text>
</g>
</svg>
