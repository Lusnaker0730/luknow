<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1165" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif" role="img" aria-label="GLP-1 減重針十大重點：作用機轉、適應對象、好處、副作用與注意事項">
<rect x="0" y="0" width="900" height="1165" fill="#f4f0e8"/>
<rect x="0" y="0" width="900" height="108" fill="#14323a"/>
<text x="450" y="50" text-anchor="middle" font-size="27" font-weight="700" fill="#ffffff">GLP-1 減重針 ·「十大重點」</text>
<text x="450" y="84" text-anchor="middle" font-size="14.5" fill="#c9d4d1">瘦瘦針的作用、適應、好處、副作用與注意事項，一次看懂</text>

<!-- 1 -->
<g transform="translate(28,130)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#c43d34"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">1</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">怎麼作用？</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">模擬腸道分泌的「腸泌素」，抑制食慾、</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">延緩胃排空，並幫助控制血糖。</text>
</g>
<!-- 2 -->
<g transform="translate(458,130)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#0f7a82"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">2</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">哪些能減重？</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">善纖達、週纖達、猛健樂</text>
<text x="24" y="122" font-size="14.5" fill="#7d8a8c">liraglutide／semaglutide／tirzepatide</text>
</g>
<!-- 3 -->
<g transform="translate(28,328)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#c43d34"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">3</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">誰適合？</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">BMI ≥30，或 ≥27 併相關共病；</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">需搭配飲食、運動與行為支持。</text>
</g>
<!-- 4 -->
<g transform="translate(458,328)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#0f7a82"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">4</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">有哪些好處？</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">減重、控糖之外，對心血管、心衰、</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">腎臟、睡眠呼吸中止、脂肪肝也有益。</text>
</g>
<!-- 5 -->
<g transform="translate(28,526)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#c43d34"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">5</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">常見副作用</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">噁心、嘔吐、腹瀉、便秘等腸胃道不適，</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">多在劑量穩定後逐漸改善。</text>
</g>
<!-- 6 -->
<g transform="translate(458,526)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#0f7a82"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">6</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">罕見但嚴重</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">胰臟炎、膽囊問題、腸阻塞；</text>
<text x="24" y="122" font-size="15.5" fill="#c43d34">出現嚴重腹痛請盡速就醫。</text>
</g>
<!-- 7 -->
<g transform="translate(28,724)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#c43d34"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">7</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">併用藥要檢視</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">降血糖（胰島素等）、降血壓藥，</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">體重降後或需減量，勿自行調整。</text>
</g>
<!-- 8 -->
<g transform="translate(458,724)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#0f7a82"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">8</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">育齡女性</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">懷孕前 2 個月停藥、須有效避孕；</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">可能影響口服避孕藥的吸收。</text>
</g>
<!-- 9 -->
<g transform="translate(28,922)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#c43d34"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">9</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">長期注意事項</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">MTC／MEN2 禁用、手術前需停藥；</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">注意脫水、糖尿病視網膜病變。</text>
</g>
<!-- 10 -->
<g transform="translate(458,922)">
<rect width="414" height="182" rx="14" fill="#fffdf9" stroke="#e3dbcc"/>
<circle cx="38" cy="40" r="19" fill="#0f7a82"/><text x="38" y="47" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">10</text>
<text x="70" y="47" font-size="19" font-weight="700" fill="#14323a">體重掉太多？</text>
<text x="24" y="94" font-size="15.5" fill="#3c5158">異常暴瘦別全歸因於藥物，要查原因；</text>
<text x="24" y="122" font-size="15.5" fill="#3c5158">補足蛋白質＋阻力訓練，防肌肉流失。</text>
</g>

<text x="450" y="1134" text-anchor="middle" font-size="13" fill="#7d8a8c">觀念整理自 Obesity Facts (2025) GLP-1 受體促效劑基層照護實務指引 ·「十大要點」｜本站原創重繪</text>
<text x="450" y="1154" text-anchor="middle" font-size="13" fill="#7d8a8c">僅供衛教參考，不構成處方或個別診療建議，用藥請務必諮詢您的醫師。</text>
</svg>
