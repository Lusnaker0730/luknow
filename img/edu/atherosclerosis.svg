<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif" role="img" aria-label="動脈粥狀硬化四階段：正常動脈、斑塊形成、斑塊增厚管腔變窄、斑塊破裂形成血栓阻塞">
<defs>
<marker id="ath-arrow" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
<path d="M0,0 L6,3 L0,6 Z" fill="#9aa5a7"/>
</marker>
</defs>

<text x="500" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#14323a">動脈粥狀硬化的進程</text>
<text x="500" y="54" text-anchor="middle" font-size="13" fill="#7d8a8c">膽固醇與脂肪在血管壁堆積成斑塊、逐漸變窄；一旦破裂形成血栓，就可能造成心肌梗塞</text>

<!-- Stage 1 正常 -->
<g transform="translate(130,158)">
<circle r="72" fill="#dd968f"/>
<circle r="52" fill="#fffdf9"/>
</g>
<text x="130" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#14323a">① 正常動脈</text>
<text x="130" y="284" text-anchor="middle" font-size="12.5" fill="#3c5158">管腔通暢、血流順暢</text>

<!-- Stage 2 斑塊形成 -->
<g transform="translate(370,158)">
<circle r="72" fill="#dd968f"/>
<circle r="52" fill="#fffdf9"/>
<path d="M-38,34 A52,52 0 0,0 40,30 A40,16 0 0,1 -38,34 Z" fill="#e0b24a"/>
</g>
<text x="370" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#14323a">② 斑塊形成</text>
<text x="370" y="284" text-anchor="middle" font-size="12.5" fill="#3c5158">脂肪開始堆積在血管內壁</text>

<!-- Stage 3 斑塊增厚 -->
<g transform="translate(630,158)">
<circle r="72" fill="#dd968f"/>
<circle r="52" fill="#fffdf9"/>
<path d="M-46,20 A52,52 0 0,0 46,18 A48,34 0 0,1 -46,20 Z" fill="#e0b24a"/>
<ellipse cx="6" cy="-24" rx="28" ry="14" fill="#e0b24a"/>
</g>
<text x="630" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#14323a">③ 斑塊增厚</text>
<text x="630" y="284" text-anchor="middle" font-size="12.5" fill="#3c5158">管腔變窄、血流減少</text>

<!-- Stage 4 斑塊破裂＋血栓 -->
<g transform="translate(870,158)">
<circle r="72" fill="#dd968f"/>
<circle r="52" fill="#fffdf9"/>
<path d="M-46,20 A52,52 0 0,0 46,18 A48,34 0 0,1 -46,20 Z" fill="#e0b24a"/>
<circle cx="0" cy="-2" r="34" fill="#8f231d"/>
<circle cx="-22" cy="-14" r="10" fill="#a52a22"/>
<circle cx="20" cy="-20" r="7" fill="#a52a22"/>
<circle cx="10" cy="18" r="8" fill="#a52a22"/>
</g>
<text x="870" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#14323a">④ 破裂＋血栓</text>
<text x="870" y="284" text-anchor="middle" font-size="12.5" fill="#3c5158">血栓阻斷血流 → 心肌梗塞</text>

<line x1="216" y1="158" x2="290" y2="158" stroke="#9aa5a7" stroke-width="2.2" marker-end="url(#ath-arrow)"/>
<line x1="456" y1="158" x2="550" y2="158" stroke="#9aa5a7" stroke-width="2.2" marker-end="url(#ath-arrow)"/>
<line x1="716" y1="158" x2="790" y2="158" stroke="#9aa5a7" stroke-width="2.2" marker-end="url(#ath-arrow)"/>
</svg>
